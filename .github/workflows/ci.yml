name: CI Build Check

# Runs on every push/PR so you find out immediately if something doesn't-
# compile, without waiting for a tag/release. Produces a downloadable debug
# APK as a workflow artifact (Actions tab -> this run -> Artifacts), but
# does NOT publish a GitHub Release and does NOT touch the update feed.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bqdiptv-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
