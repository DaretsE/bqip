name: Release APK

# Builds and publishes a new GitHub Release automatically on every push to
# main. The version is computed automatically (last release's patch + 1),
# so you never have to create/push a tag by hand — just upload/commit your
# changes on GitHub and this runs on its own. The app's in-app updater
# (UpdateManager.kt) polls exactly this Releases feed, so every push here
# becomes an update your TVs will offer to install.
#
# workflow_dispatch is kept as a manual fallback if you ever want to force
# a specific version.
on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".github/workflows/**"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Force a specific version tag, e.g. v1.0.0 (leave empty to auto-increment)'
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full tag history to compute the next version

      - name: Resolve version
        id: version
        run: |
          MANUAL_TAG="${{ github.event.inputs.tag }}"
          if [ -n "$MANUAL_TAG" ]; then
            TAG="$MANUAL_TAG"
          else
            LAST_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)
            if [ -z "$LAST_TAG" ]; then
              TAG="v1.0.0"
            else
              VERSION="${LAST_TAG#v}"
              MAJOR=$(echo "$VERSION" | cut -d. -f1)
              MINOR=$(echo "$VERSION" | cut -d. -f2)
              PATCH=$(echo "$VERSION" | cut -d. -f3)
              TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
          fi
          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "Building $TAG (versionCode $CODE)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # ---- Optional release signing -------------------------------------
      # If you've added KEYSTORE_BASE64 / KEYSTORE_PASSWORD / KEY_ALIAS /
      # KEY_PASSWORD as repo secrets (Settings → Secrets and variables →
      # Actions), this decodes the keystore and the build below signs with
      # it. Otherwise the app falls back to a debug-signed build so this
      # workflow still succeeds out of the box.
      - name: Decode release keystore (if configured)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "BQDIPTV_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "BQDIPTV_KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "BQDIPTV_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
            echo "BQDIPTV_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"
            echo "Release keystore found — build will be release-signed."
          else
            echo "No release keystore secret configured — build will use debug signing."
          fi

      - name: Build release APK
        run: |
          gradle assembleRelease \
            -PversionName=${{ steps.version.outputs.name }} \
            -PversionCode=${{ steps.version.outputs.code }} \
            --no-daemon

      - name: Locate and rename APK
        id: apk
        run: |
          SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          DEST="BQDiptv-${{ steps.version.outputs.tag }}.apk"
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: BQDiptv ${{ steps.version.outputs.name }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
