name: Release APK

# Push a tag like "v1.0.0" (or run this workflow manually and supply one)
# to build a release APK and publish it as a GitHub Release. The app's
# in-app updater (UpdateManager.kt) polls exactly this Releases feed, so
# every tag pushed here becomes an update your TVs will offer to install.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to build, e.g. v1.0.0'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "code=$CODE" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # ---- Optional release signing -------------------------------------
      # If you've added KEYSTORE_BASE64 / KEYSTORE_PASSWORD / KEY_ALIAS /
      # KEY_PASSWORD as repo secrets (Settings → Secrets and variables →
      # Actions), this decodes the keystore and the build below signs with
      # it. Otherwise the app falls back to a debug-signed build so this
      # workflow still succeeds out of the box.
      - name: Decode release keystore (if configured)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "BQDIPTV_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
          echo "BQDIPTV_KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "BQDIPTV_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "BQDIPTV_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Build release APK
        run: |
          gradle assembleRelease \
            -PversionName=${{ steps.version.outputs.name }} \
            -PversionCode=${{ steps.version.outputs.code }} \
            --no-daemon

      - name: Locate and rename APK
        id: apk
        run: |
          SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          DEST="BQDiptv-${{ steps.version.outputs.tag }}.apk"
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: BQDiptv ${{ steps.version.outputs.name }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
